line-length = 100
target-version = "py311"

exclude = [
    ".eggs",
    ".git",
    ".ruff_cache",
    "__pypackages__",
    "dist",
    ".dev",
    ".repos",
    ".venv",
]

[lint]
select = ["E", "F", "I", "B", "UP"]
ignore = [
    "E501",  # Line length check (handled by formatter)
]
unfixable = ["F841"]

[lint.per-file-ignores]
"src/codexra/api/*.py" = ["B008"]
# FastAPI routes intentionally declare Depends/Query/File in endpoint defaults.
"src/codexra/interfaces/http/**/*.py" = ["B008"]

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
